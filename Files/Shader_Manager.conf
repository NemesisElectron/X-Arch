# Shader Manager configuration
# Parent directories are scanned recursively for Shaders/ and Textures/ subdirs

# Parent directories (user-added)
parentDir = /opt/reshade

# Discovered shader paths (auto-generated on scan)
shaderPath = /opt/reshade/shaders
shaderPath = /opt/reshade/shaders/CRT-Royale/crt-royale/shaders

# Discovered texture paths (auto-generated on scan)
texturePath = /opt/reshade/textures
